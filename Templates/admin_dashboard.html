{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
    <h2><i class="fas fa-user-shield"></i> Admin Dashboard</h2>
    <div class="card">
        <h3>Users</h3>
        <table>
            <tr><th>Username</th><th>First Name</th><th>Last Name</th><th>Email</th><th>Actions</th></tr>
            {% for user in users %}
                <tr>
                    <td>{{ user[1] }}</td>
                    <td>{{ user[2] }}</td>
                    <td>{{ user[3] }}</td>
                    <td>{{ user[4] }}</td>
                    <td>
                        <a href="{{ url_for('admin_user_details', user_id=user[0]) }}" class="glow-button small"><i class="fas fa-eye"></i> View</a>
                        <form action="{{ url_for('delete_user', user_id=user[0]) }}" method="POST" style="display:inline;">
                            <button type="submit" class="glow-button small" onclick="return confirm('Are you sure you want to delete this user?');"><i class="fas fa-trash"></i> Delete</button>
                        </form>
                        <form action="{{ url_for('reset_password', user_id=user[0]) }}" method="POST" style="display:inline;">
                            <button type="submit" class="glow-button small"><i class="fas fa-key"></i> Reset Password</button>
                        </form>
                    </td>
                </tr>
            {% endfor %}
        </table>
    </div>
{% endblock %}
