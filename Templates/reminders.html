{% extends "base.html" %}
   {% block title %}Reminders{% endblock %}
   {% block content %}
       <h2><i class="fas fa-bell"></i> Reminders</h2>
       <div class="card">
           <h3>Set New Reminder</h3>
           <form method="POST" action="{{ url_for('set_reminder') }}" class="form-slide">
               <div class="form-group">
                   <label for="description">Description</label>
                   <input type="text" id="description" name="description" required placeholder="e.g., Pay Credit Card">
               </div>
               <div class="form-group">
                   <label for="date">Date</label>
                   <input type="date" id="date" name="date" required>
               </div>
               <button type="submit" class="glow-button"><i class="fas fa-save"></i> Set Reminder</button>
           </form>
       </div>
       <div class="card">
           <h3>Current Reminders</h3>
           {% if reminders %}
               <table>
                   <tr><th>Description</th><th>Date</th></tr>
                   {% for r in reminders %}
                       <tr>
                           <td>{{ r[0] }}</td>
                           <td>{{ r[1] }}</td>
                       </tr>
                   {% endfor %}
               </table>
           {% else %}
               <p>No reminders set yet.</p>
           {% endif %}
       </div>
   {% endblock %}
