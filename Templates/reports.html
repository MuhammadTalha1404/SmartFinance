{% extends "base.html" %}
   {% block title %}Reports{% endblock %}
   {% block content %}
       <h2><i class="fas fa-chart-bar"></i> Financial Reports</h2>
       <div class="card">
           <h3>Generate Report</h3>
           <p><a href="{{ url_for('export_pdf', period='weekly') }}" class="glow-button"><i class="fas fa-file-pdf"></i> Weekly Report</a></p>
           <p><a href="{{ url_for('export_pdf', period='monthly') }}" class="glow-button"><i class="fas fa-file-pdf"></i> Monthly Report</a></p>
           <p><a href="{{ url_for('export_pdf', period='yearly') }}" class="glow-button"><i class="fas fa-file-pdf"></i> Yearly Report</a></p>
       </div>
       <div class="card">
           <h3>Predictions</h3>
           <p><a href="{{ url_for('predict_spending') }}" class="glow-button"><i class="fas fa-chart-line"></i> Predict Next Month's Spending</a></p>
           <p><a href="{{ url_for('estimate_tax') }}" class="glow-button"><i class="fas fa-calculator"></i> Estimate Tax</a></p>
       </div>
   {% endblock %}
